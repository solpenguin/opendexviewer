  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
    (function() {
      var container = document.getElementById('link-container');
      var params = new URLSearchParams(window.location.search);
      var token = params.get('token');

      function showError(msg) {
        container.innerHTML = '';
        var iconDiv = document.createElement('div');
        iconDiv.style.cssText = 'color: #ef4444; margin-bottom: 1rem;';
        iconDiv.innerHTML = '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom: 0.5rem;"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';
        var h2 = document.createElement('h2');
        h2.style.cssText = 'margin: 0 0 0.5rem; font-size: 1.25rem;';
        h2.textContent = 'Link Failed';
        var p = document.createElement('p');
        p.style.cssText = 'color: var(--text-secondary); margin: 0 0 1.5rem;';
        p.textContent = msg; // Safe: textContent escapes HTML
        var a = document.createElement('a');
        a.href = '/';
        a.className = 'btn btn-primary';
        a.textContent = 'Go to Home';
        container.appendChild(iconDiv);
        container.appendChild(h2);
        container.appendChild(p);
        container.appendChild(a);
      }

      function showSuccess(walletAddress) {
        var truncated = walletAddress.slice(0, 4) + '...' + walletAddress.slice(-4);
        container.innerHTML = '';
        var iconDiv = document.createElement('div');
        iconDiv.style.cssText = 'color: #22c55e; margin-bottom: 1rem;';
        iconDiv.innerHTML = '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom: 0.5rem;"><circle cx="12" cy="12" r="10"/><polyline points="16 10 11 15 8 12"/></svg>';
        var h2 = document.createElement('h2');
        h2.style.cssText = 'margin: 0 0 0.5rem; font-size: 1.25rem;';
        h2.textContent = 'Device Linked!';
        var p1 = document.createElement('p');
        p1.style.cssText = 'color: var(--text-secondary); margin: 0 0 0.5rem;';
        p1.textContent = 'Connected to wallet';
        var p2 = document.createElement('p');
        p2.style.cssText = 'font-family: var(--font-mono); color: var(--accent); margin: 0 0 1rem;';
        p2.textContent = truncated;
        var p3 = document.createElement('p');
        p3.style.cssText = 'color: var(--text-tertiary); font-size: 0.85rem;';
        p3.textContent = 'Redirecting to home...';
        container.appendChild(iconDiv);
        container.appendChild(h2);
        container.appendChild(p1);
        container.appendChild(p2);
        container.appendChild(p3);
        setTimeout(function() { window.location.href = '/'; }, 2000);
      }

      // Validate token format
      if (!token || !/^[a-f0-9]{64}$/i.test(token)) {
        showError('Invalid or missing link token. Please generate a new link from your desktop.');
        return;
      }

      // Verify and activate the token
      fetch(API_BASE_URL + '/api/auth/device-session/verify?token=' + encodeURIComponent(token))
        .then(function(response) { return response.json(); })
        .then(function(data) {
          if (!data.success) {
            showError(data.message || 'This link has expired or is invalid. Please generate a new one from your desktop.');
            return;
          }
          // Store session in localStorage
          localStorage.setItem('opendex_device_session', token);
          localStorage.setItem('opendex_device_wallet', data.data.walletAddress);
          showSuccess(data.data.walletAddress);
        })
        .catch(function() {
          showError('Could not verify the link. Please check your connection and try again.');
        });
    })();

    // Dropdown toggle for mobile
    (function() {
      var dropdowns = document.querySelectorAll('.nav-dropdown');
      dropdowns.forEach(function(dd) {
        var toggle = dd.querySelector('.nav-dropdown-toggle');
        if (!toggle) return;
        toggle.addEventListener('click', function(e) {
          if (!matchMedia('(hover: none)').matches) return;
          if (dd.classList.contains('open')) return;
          e.preventDefault();
          dd.classList.add('open');
        });
      });
      document.addEventListener('click', function(e) {
        dropdowns.forEach(function(dd) {
          if (!dd.contains(e.target)) dd.classList.remove('open');
        });
      });
    })();
  </script>
