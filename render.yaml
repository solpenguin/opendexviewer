# Render Blueprint - OpenDexViewer
# Deploy with: render blueprint apply
# Documentation: https://render.com/docs/blueprint-spec
#
# NOTE: Static sites cannot be created via blueprint.
# After deploying this blueprint, manually create the frontend static site.

services:
  # =====================================================
  # Backend API Service
  # =====================================================
  - type: web
    name: opendex-api
    runtime: node
    region: oregon
    plan: starter
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      # Database connection (auto-populated from Render PostgreSQL)
      - key: DATABASE_URL
        fromDatabase:
          name: opendex-db
          property: connectionString

      # Redis connection (auto-populated from Render Redis)
      - key: REDIS_URL
        fromService:
          type: redis
          name: opendex-redis
          property: connectionString

      # API Keys (set these manually in Render dashboard)
      - key: HELIUS_API_KEY
        sync: false
      - key: COINGECKO_API_KEY
        sync: false
      - key: BIRDEYE_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

      # Admin panel password (required for /admin)
      - key: ADMIN_PASSWORD
        sync: false

      # Cookie signing secret (required — sessions invalidated on restart without this)
      - key: COOKIE_SECRET
        sync: false

      # Jupiter API key (required for swap routing)
      - key: JUPITER_API_KEY
        sync: false

      # SSL certificate verification for PostgreSQL (set to 'false' for Render's self-signed certs)
      - key: DB_SSL_REJECT_UNAUTHORIZED
        value: "false"

      # Application settings
      - key: NODE_ENV
        value: production

      # CORS - Update this to your actual frontend URL
      - key: CORS_ORIGIN
        value: https://opendex-frontend.onrender.com,https://opendex.online

      # Rate limiting configuration
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"

      # Cache settings (seconds)
      - key: CACHE_TOKEN_TTL
        value: "300"
      - key: CACHE_PRICE_TTL
        value: "60"

      # Auto-moderation thresholds
      - key: AUTO_APPROVE_THRESHOLD
        value: "10"
      - key: AUTO_REJECT_THRESHOLD
        value: "-10"

      # Hackathon token list (comma-separated Solana mint addresses)
      - key: HACKATHON_TOKENS
        sync: false

      # Performance tuning
      # View count buffer: flush every 2s instead of 5s (reduces memory spikes under load)
      - key: VIEW_FLUSH_INTERVAL_MS
        value: "2000"
      # View buffer cap: 10k instead of 50k (prevents unbounded memory growth)
      - key: VIEW_BUFFER_MAX_SIZE
        value: "10000"

  # =====================================================
  # Background Worker (BullMQ job processor)
  # Handles: view count batching, session cleanup, stats
  # =====================================================
  - type: worker
    name: opendex-worker
    runtime: node
    region: oregon
    plan: starter
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run worker
    envVars:
      # Database connection (auto-populated from Render PostgreSQL)
      - key: DATABASE_URL
        fromDatabase:
          name: opendex-db
          property: connectionString

      # Redis connection (auto-populated from Render Redis)
      - key: REDIS_URL
        fromService:
          type: redis
          name: opendex-redis
          property: connectionString

      # API Keys — worker needs these for background jobs
      # (similar-tokens uses GeckoTerminal, hold-times/diamond-hands use Helius)
      - key: HELIUS_API_KEY
        sync: false
      - key: COINGECKO_API_KEY
        sync: false
      - key: BIRDEYE_API_KEY
        sync: false

      # SSL certificate verification for PostgreSQL (set to 'false' for Render's self-signed certs)
      - key: DB_SSL_REJECT_UNAUTHORIZED
        value: "false"

      # Application settings
      - key: NODE_ENV
        value: production

      # Worker performance tuning
      - key: WORKER_CONCURRENCY
        value: "50"
      - key: WORKER_LIMITER_MAX
        value: "50"

  # =====================================================
  # Telegram Bot (Long polling worker)
  # =====================================================
  - type: worker
    name: opendex-telegram-bot
    runtime: node
    region: oregon
    plan: starter
    rootDir: telegram-bot
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: OPENDEX_API_URL
        value: https://opendex-api-dy30.onrender.com
      - key: OPENDEX_FRONTEND_URL
        value: https://opendex.online
      - key: NODE_ENV
        value: production

  # =====================================================
  # Redis (BullMQ job queue)
  # =====================================================
  - type: redis
    name: opendex-redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru
    # ipAllowList omitted to default to internal-only access

# =====================================================
# PostgreSQL Database
# =====================================================
databases:
  - name: opendex-db
    plan: basic-256mb
    region: oregon
    databaseName: opendex
    user: opendex_user

# =====================================================
# MANUAL STEP REQUIRED:
# After blueprint deployment, create a Static Site manually:
#
# 1. Go to Render Dashboard > New > Static Site
# 2. Connect your GitHub repository
# 3. Configure:
#    - Name: opendex-frontend
#    - Root Directory: frontend
#    - Build Command: echo "No build needed"
#    - Publish Directory: .
# 4. Add these rewrite rules in Settings > Redirects/Rewrites:
#    - Source: /token/*    -> Destination: /token.html (Rewrite)
#    - Source: /submit     -> Destination: /submit.html (Rewrite)
#    - Source: /hackathon  -> Destination: /hackathon.html (Rewrite)
#    - Source: /ogfinder   -> Destination: /ogfinder.html (Rewrite)
#    - Source: /tokens     -> Destination: /tokens.html (Rewrite)
#    - Source: /about      -> Destination: /about.html (Rewrite)
#    - Source: /api        -> Destination: /api.html (Rewrite)
#    - Source: /burn       -> Destination: /burn.html (Rewrite)
#    - Source: /community  -> Destination: /community.html (Rewrite)
#    - Source: /development -> Destination: /development.html (Rewrite)
#    - Source: /docs       -> Destination: /docs.html (Rewrite)
#    - Source: /spikes     -> Destination: /spikes.html (Rewrite)
# =====================================================
